<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveFrame - Game Overlay</title>
    <style>
      html, body { margin:0; width:100%; height:100%; overflow:hidden; background:transparent; font-family:Arial,sans-serif; }
      :root { --accentA:#3b82f6; --accentB:#22d3ee; --glow:rgba(59,130,246,.45); }
      .wrap { position:fixed; top:20px; left:20px; width:min(560px,calc(100vw - 40px)); color:#f8fafc; }
      .wrap.right { left:auto; right:20px; }
      .card { border-radius:14px; border:1px solid rgba(148,163,184,.3); background:rgba(2,6,23,.78); backdrop-filter:blur(6px); padding:12px; box-shadow:0 0 20px var(--glow); }
      .light .card { background:rgba(255,255,255,.9); color:#0f172a; border-color:rgba(15,23,42,.12); }
      .glass .card { background:rgba(15,23,42,.58); border-color:color-mix(in srgb,var(--accentA) 55%,transparent); }
      .header { display:flex; align-items:center; justify-content:space-between; gap:8px; }
      .title { font-size:16px; font-weight:700; }
      .sub { margin-top:3px; font-size:12px; opacity:.82; }
      .level { font-size:13px; border-radius:999px; padding:5px 9px; border:1px solid color-mix(in srgb,var(--accentA) 75%,transparent); background:color-mix(in srgb,var(--accentA) 28%,transparent); }
      .stats { margin-top:10px; display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
      .stat { border-radius:10px; border:1px solid rgba(148,163,184,.28); background:rgba(15,23,42,.58); padding:8px; text-align:center; }
      .light .stat { background:rgba(241,245,249,.78); border-color:rgba(15,23,42,.12); }
      .label { font-size:10px; opacity:.82; letter-spacing:.05em; }
      .val { margin-top:4px; font-size:14px; font-weight:700; }
      .status { margin-top:8px; font-size:12px; opacity:.88; }
      .hidden { display:none !important; }
    </style>
  </head>
  <body>
    <div id="wrap" class="wrap">
      <div class="card">
        <div class="header">
          <div>
            <div id="title" class="title">CS2 · FACEIT</div>
            <div id="sub" class="sub">nickname: -</div>
          </div>
          <div id="level" class="level">LVL 0</div>
        </div>
        <div id="stats" class="stats">
          <div id="card-elo" class="stat"><div class="label">ELO</div><div id="elo" class="val">0</div></div>
          <div id="card-matches" class="stat"><div class="label">MATCHES</div><div id="matches" class="val">0</div></div>
          <div id="card-wr" class="stat"><div class="label">WINRATE</div><div id="wr" class="val">0%</div></div>
          <div id="card-kd" class="stat"><div class="label">K/D</div><div id="kd" class="val">0.00</div></div>
          <div id="card-avg" class="stat"><div class="label">AVG</div><div id="avg" class="val">0.00</div></div>
          <div id="card-hs" class="stat"><div class="label">HS%</div><div id="hs" class="val">0%</div></div>
          <div id="card-wins" class="stat"><div class="label">WINS</div><div id="wins" class="val">0</div></div>
          <div id="card-losses" class="stat"><div class="label">LOSSES</div><div id="losses" class="val">0</div></div>
          <div id="card-updated" class="stat"><div class="label">UPDATED</div><div id="updated" class="val">-</div></div>
          <div id="card-mode" class="stat"><div class="label">MODE</div><div id="mode" class="val">LIVE</div></div>
        </div>
        <div id="status" class="status">Waiting for Faceit data...</div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const params = new URLSearchParams(location.search);
      const wrap = document.getElementById("wrap");
      const statusEl = document.getElementById("status");
      const presets = {
        "neon-blue": ["#3b82f6","#22d3ee","rgba(59,130,246,.45)"], "neon-purple": ["#8b5cf6","#ec4899","rgba(139,92,246,.45)"],
        "cyber-green": ["#22c55e","#14b8a6","rgba(34,197,94,.45)"], "fire-red": ["#ef4444","#f59e0b","rgba(239,68,68,.45)"],
        "sunset": ["#fb923c","#f43f5e","rgba(251,146,60,.45)"], "ice": ["#38bdf8","#67e8f9","rgba(56,189,248,.45)"],
        "gold": ["#f59e0b","#facc15","rgba(245,158,11,.45)"], "pink": ["#ec4899","#f472b6","rgba(236,72,153,.45)"],
        "obsidian": ["#64748b","#334155","rgba(100,116,139,.45)"], "mint": ["#10b981","#2dd4bf","rgba(16,185,129,.45)"],
        "royal": ["#6366f1","#818cf8","rgba(99,102,241,.45)"], "mono": ["#e5e7eb","#9ca3af","rgba(156,163,175,.35)"]
      };
      let state = {
        game: "cs2", provider: "faceit", nickname: params.get("nickname") || "",
        position: params.get("position") === "right" ? "right" : "left",
        theme: ["dark","glass","light"].includes(params.get("theme")) ? params.get("theme") : "dark",
        stylePreset: params.get("stylePreset") || "neon-blue",
        displayMode: ["full","elo-only","elo-kd-avg","wl-only"].includes(params.get("displayMode")) ? params.get("displayMode") : "full",
        stats: { elo:0, level:0, matches:0, winRate:0, kd:0, avg:0, hs:0, wins:0, losses:0 },
        updatedAt:0, status:"idle", error:""
      };

      function applyPreset(name) {
        const p = presets[name] || presets["neon-blue"];
        document.documentElement.style.setProperty("--accentA", p[0]);
        document.documentElement.style.setProperty("--accentB", p[1]);
        document.documentElement.style.setProperty("--glow", p[2]);
      }
      function showCards(ids) {
        ["elo","matches","wr","kd","avg","hs","wins","losses","updated","mode"].forEach((id) => {
          const el = document.getElementById(`card-${id}`);
          if (!el) return;
          el.classList.toggle("hidden", !ids.includes(id));
        });
      }
      function applyDisplayMode(mode) {
        if (mode === "elo-only") showCards(["elo","mode"]);
        else if (mode === "elo-kd-avg") showCards(["elo","kd","avg","mode"]);
        else if (mode === "wl-only") showCards(["wins","losses","mode"]);
        else showCards(["elo","matches","wr","kd","avg","hs","wins","losses","updated","mode"]);
      }
      function render() {
        applyPreset(state.stylePreset);
        applyDisplayMode(state.displayMode || "full");
        wrap.className = `wrap ${state.position === "right" ? "right" : ""} ${state.theme}`.trim();
        document.getElementById("sub").textContent = `nickname: ${state.nickname || "-"}`;
        document.getElementById("level").textContent = `LVL ${Math.floor(Number(state.stats.level || 0))}`;
        document.getElementById("elo").textContent = String(Math.floor(Number(state.stats.elo || 0)));
        document.getElementById("matches").textContent = String(Math.floor(Number(state.stats.matches || 0)));
        document.getElementById("wr").textContent = `${Number(state.stats.winRate || 0).toFixed(1)}%`;
        document.getElementById("kd").textContent = Number(state.stats.kd || 0).toFixed(2);
        document.getElementById("avg").textContent = Number(state.stats.avg || 0).toFixed(2);
        document.getElementById("hs").textContent = `${Number(state.stats.hs || 0).toFixed(1)}%`;
        document.getElementById("wins").textContent = String(Math.floor(Number(state.stats.wins || 0)));
        document.getElementById("losses").textContent = String(Math.floor(Number(state.stats.losses || 0)));
        document.getElementById("updated").textContent = state.updatedAt ? new Date(state.updatedAt).toLocaleTimeString() : "-";
        if (state.status === "loading") statusEl.textContent = "Loading Faceit stats...";
        else if (state.status === "error") statusEl.textContent = `Error: ${state.error || "failed to load stats"}`;
        else if (state.status === "ready") statusEl.textContent = "Faceit stats synced";
        else statusEl.textContent = "Waiting for Faceit data...";
      }
      socket.on("game:state", (next) => { if (!next) return; state = { ...state, ...next }; render(); });
      socket.on("runtime:emergency", (s = {}) => {
        const on = Boolean(s.emergencyBlank);
        document.body.style.opacity = on ? "0" : "1";
      });
      render();
    </script>
  </body>
</html>
