<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveFrame - Chat Overlay</title>
    <style>
      :root {
        --font-scale: 100%;
      }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: Arial, sans-serif;
      }
      .wrap {
        position: fixed;
        top: 20px;
        bottom: 20px;
        right: 20px;
        width: min(430px, calc(100vw - 40px));
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        gap: 8px;
      }
      .wrap.left {
        right: auto;
        left: 20px;
      }
      .msg {
        border-radius: 12px;
        padding: 10px 12px;
        font-size: var(--font-scale);
        line-height: 1.35;
        animation: rise 0.35s ease-out;
      }
      .msg.anim-slide { animation: slide 0.3s ease-out; }
      .msg.anim-pop { animation: pop 0.3s ease-out; }
      .msg.anim-none { animation: none; }
      .msg.mod {
        box-shadow: inset 0 0 0 1px rgba(34, 197, 94, 0.65);
      }
      .msg.subscriber {
        box-shadow: inset 0 0 0 1px rgba(244, 114, 182, 0.65);
      }
      .msg.vip {
        box-shadow: inset 0 0 0 1px rgba(168, 85, 247, 0.75);
      }
      .dark .msg {
        color: #f8fafc;
        background: rgba(2, 6, 23, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.28);
      }
      .glass .msg {
        color: #ecfeff;
        background: rgba(15, 23, 42, 0.58);
        border: 1px solid rgba(56, 189, 248, 0.38);
        backdrop-filter: blur(6px);
      }
      .light .msg {
        color: #0f172a;
        background: rgba(248, 250, 252, 0.86);
        border: 1px solid rgba(15, 23, 42, 0.14);
      }
      .meta {
        margin-bottom: 4px;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 0.75em;
        opacity: 0.8;
      }
      .user {
        font-weight: 700;
      }
      .text {
        word-break: break-word;
      }
      @keyframes rise {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slide {
        from { opacity: 0; transform: translateX(8px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes pop {
        from { opacity: 0; transform: scale(0.96); }
        to { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="wrap" class="wrap dark"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const wrap = document.getElementById("wrap");
      const params = new URLSearchParams(location.search);

      let twitchSocket = null;
      let reconnectTimer = null;
      let currentChannel = "";
      let state = {
        channel: (params.get("channel") || "").replace(/^#/, "").toLowerCase(),
        maxMessages: Math.max(3, Math.min(25, Number(params.get("max")) || 8)),
        position: params.get("position") === "left" ? "left" : "right",
        theme: ["dark", "glass", "light"].includes(params.get("theme")) ? params.get("theme") : "dark",
        fontScale: Math.max(80, Math.min(180, Number(params.get("fontScale")) || 100)),
        showTime: params.get("showTime") === "0" ? false : true,
        hideCommands: params.get("hideCommands") === "1",
        safeMode: params.get("safeMode") === "0" ? false : true,
        hideViewer: params.get("hideViewer") === "1",
        hideSubscriber: params.get("hideSubscriber") === "1",
        hideVip: params.get("hideVip") === "1",
        hideMod: params.get("hideMod") === "1",
        dedupeWindowSec: Math.max(0, Math.min(120, Number(params.get("dedupeWindowSec")) || 20)),
        fadeSec: Math.max(0, Math.min(120, Number(params.get("fadeSec")) || 0)),
        blockedWords: decodeURIComponent(params.get("blockedWords") || ""),
        hideLinks: params.get("hideLinks") === "1",
        animation: ["rise", "slide", "pop", "none"].includes(params.get("animation")) ? params.get("animation") : "rise",
        minLength: Math.max(1, Math.min(120, Number(params.get("minLength")) || 1)),
        maxLength: Math.max(10, Math.min(500, Number(params.get("maxLength")) || 280))
      };
      const dedupeMap = new Map();

      function escapeHtml(input) {
        return String(input)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function applyUiState() {
        wrap.className = `wrap ${state.position === "left" ? "left" : ""} ${state.theme}`.trim();
        document.documentElement.style.setProperty("--font-scale", `${state.fontScale}%`);
      }

      function parseIrcTags(rawTags = "") {
        const tags = {};
        rawTags.split(";").forEach((part) => {
          const idx = part.indexOf("=");
          if (idx < 0) return;
          const key = part.slice(0, idx);
          const value = part.slice(idx + 1)
            .replace(/\\s/g, " ")
            .replace(/\\:/g, ";")
            .replace(/\\\\/g, "\\");
          tags[key] = value;
        });
        return tags;
      }

      function inferRole(tags = {}) {
        const badges = String(tags.badges || "");
        if (badges.includes("broadcaster/")) return "broadcaster";
        if (badges.includes("moderator/") || tags.mod === "1") return "mod";
        if (badges.includes("vip/")) return "vip";
        if (badges.includes("subscriber/")) return "subscriber";
        return "viewer";
      }

      function parsePrivmsg(line) {
        const match = line.match(/^@([^ ]+)\s+:([^!]+)![^ ]+\s+PRIVMSG\s+#[^\s]+\s+:(.*)$/);
        if (!match) return null;
        const tags = parseIrcTags(match[1]);
        const userFromPrefix = match[2] || "";
        return {
          user: tags["display-name"] || tags.login || userFromPrefix || "viewer",
          text: match[3] || "",
          color: tags.color || "#93c5fd",
          ts: Date.now(),
          source: "twitch",
          role: inferRole(tags)
        };
      }

      function isLikelyTwitchForbidden(text) {
        const lower = text.toLowerCase();
        // Common prohibited patterns (RU/EN profanity, hate slurs, self-harm prompts).
        const forbiddenPatterns = [
          /\b(?:n[i1]gg(?:a|er)?|fag(?:got)?|kys|retard(?:ed)?)\b/i,
          /\b(?:бля(?:дь)?|сук[аи]?|хуй|пизд(?:а|ец|eц)?|еб(?:а|у|ан)|шлюх[аи]?|пид(?:ор|ар)|педик)\b/i
        ];
        if (forbiddenPatterns.some((rx) => rx.test(lower))) return true;
        // Aggressive caps spam
        const letters = text.replace(/[^a-zа-яё]/gi, "");
        if (letters.length >= 14) {
          const upper = letters.replace(/[^A-ZА-ЯЁ]/g, "").length;
          if (upper / letters.length > 0.75) return true;
        }
        // Flood / repeated characters.
        if (/(.)\1{8,}/i.test(text)) return true;
        return false;
      }

      function addMessage(message) {
        const textRaw = String(message.text || "");
        if (textRaw.length < state.minLength || textRaw.length > state.maxLength) {
          return;
        }
        if (state.hideCommands && textRaw.trim().startsWith("!")) {
          return;
        }
        if (state.hideLinks && /(https?:\/\/|www\.)/i.test(textRaw)) {
          return;
        }
        if (state.safeMode && isLikelyTwitchForbidden(textRaw)) {
          return;
        }
        const blockList = String(state.blockedWords || "")
          .split(",")
          .map((w) => w.trim().toLowerCase())
          .filter(Boolean);
        const lower = textRaw.toLowerCase();
        if (blockList.some((bad) => lower.includes(bad))) {
          return;
        }

        const role = message.role || "";
        if (
          (state.hideViewer && role === "viewer") ||
          (state.hideSubscriber && role === "subscriber") ||
          (state.hideVip && role === "vip") ||
          (state.hideMod && role === "mod")
        ) {
          return;
        }
        const dedupeKey = `${String(message.user || "").toLowerCase()}::${textRaw.toLowerCase()}`;
        const now = Date.now();
        const prevAt = dedupeMap.get(dedupeKey) || 0;
        if (state.dedupeWindowSec > 0 && (now - prevAt) < (state.dedupeWindowSec * 1000)) return;
        dedupeMap.set(dedupeKey, now);

        const msg = document.createElement("div");
        msg.className = "msg";
        msg.classList.add(`anim-${state.animation}`);
        if (role === "mod" || role === "broadcaster") msg.classList.add("mod");
        if (role === "subscriber") msg.classList.add("subscriber");
        if (role === "vip") msg.classList.add("vip");
        const time = new Date(message.ts || Date.now());
        const timeLabel = `${String(time.getHours()).padStart(2, "0")}:${String(time.getMinutes()).padStart(2, "0")}`;

        msg.innerHTML = `
          <div class="meta">
            <span class="user" style="color:${escapeHtml(message.color || "#93c5fd")}">${escapeHtml(message.user || "viewer")}</span>
            ${state.showTime ? `<span>${timeLabel}</span>` : ""}
          </div>
          <div class="text">${escapeHtml(textRaw)}</div>
        `;
        wrap.appendChild(msg);
        socket.emit("chat:ingest");

        if (state.fadeSec > 0) {
          const fadeMs = state.fadeSec * 1000;
          setTimeout(() => {
            msg.style.transition = "opacity 0.3s ease";
            msg.style.opacity = "0";
            setTimeout(() => {
              if (msg.parentNode === wrap) wrap.removeChild(msg);
            }, 320);
          }, fadeMs);
        }

        while (wrap.childElementCount > state.maxMessages) {
          wrap.removeChild(wrap.firstElementChild);
        }
      }

      async function connectTwitchChannel(channel) {
        if (!channel) {
          return;
        }
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
        if (twitchSocket) {
          try { twitchSocket.close(); } catch {}
          twitchSocket = null;
        }

        currentChannel = channel;
        const nick = `justinfan${Math.floor(Math.random() * 1e9)}`;
        const ws = new WebSocket("wss://irc-ws.chat.twitch.tv:443");
        twitchSocket = ws;

        ws.addEventListener("open", () => {
          ws.send("CAP REQ :twitch.tv/tags twitch.tv/commands");
          ws.send(`NICK ${nick}`);
          ws.send(`JOIN #${channel}`);
        });

        ws.addEventListener("message", (event) => {
          const chunk = String(event.data || "");
          const lines = chunk.split("\r\n").filter(Boolean);
          lines.forEach((line) => {
            if (line.startsWith("PING ")) {
              ws.send(`PONG ${line.slice(5)}`);
              return;
            }
            if (line.includes(" 001 ")) {
              socket.emit("runtime:set-health", { key: "twitch", value: "ok" });
              return;
            }
            if (!line.includes(" PRIVMSG ")) return;
            const parsed = parsePrivmsg(line);
            if (!parsed) return;
            addMessage(parsed);
          });
        });

        ws.addEventListener("error", () => {
          socket.emit("runtime:set-health", { key: "twitch", value: "error" });
        });

        ws.addEventListener("close", () => {
          if (twitchSocket !== ws) return;
          socket.emit("runtime:set-health", { key: "twitch", value: "warn" });
          reconnectTimer = setTimeout(() => {
            if (currentChannel === channel) {
              connectTwitchChannel(channel);
            }
          }, 3000);
        });
      }

      function applyState(next) {
        state = { ...state, ...next };
        applyUiState();
        if (state.channel && state.channel !== currentChannel) {
          connectTwitchChannel(state.channel);
        }
      }

      socket.on("chat:state", (s) => {
        if (!s) return;
        applyState({
          channel: s.channel || state.channel,
          maxMessages: s.maxMessages ?? state.maxMessages,
          position: s.position ?? state.position,
          theme: s.theme ?? state.theme,
          fontScale: s.fontScale ?? state.fontScale,
          showTime: typeof s.showTime === "boolean" ? s.showTime : state.showTime,
          hideCommands: typeof s.hideCommands === "boolean" ? s.hideCommands : state.hideCommands,
          safeMode: typeof s.safeMode === "boolean" ? s.safeMode : state.safeMode,
          hideViewer: typeof s.hideViewer === "boolean" ? s.hideViewer : state.hideViewer,
          hideSubscriber: typeof s.hideSubscriber === "boolean" ? s.hideSubscriber : state.hideSubscriber,
          hideVip: typeof s.hideVip === "boolean" ? s.hideVip : state.hideVip,
          hideMod: typeof s.hideMod === "boolean" ? s.hideMod : state.hideMod,
          dedupeWindowSec: s.dedupeWindowSec ?? state.dedupeWindowSec,
          fadeSec: s.fadeSec ?? state.fadeSec,
          blockedWords: s.blockedWords ?? state.blockedWords,
          hideLinks: typeof s.hideLinks === "boolean" ? s.hideLinks : state.hideLinks,
          animation: s.animation ?? state.animation,
          minLength: s.minLength ?? state.minLength,
          maxLength: s.maxLength ?? state.maxLength
        });
      });

      socket.on("chat:message", (m) => addMessage(m || {}));
      socket.on("chat:now-playing", (p = {}) => {
        if (!p.title) return;
        addMessage({
          user: "music",
          text: `Now playing: ${p.title}`,
          color: "#22d3ee",
          ts: Date.now(),
          source: "music",
          role: ""
        });
      });
      socket.on("runtime:emergency", (s = {}) => {
        const on = Boolean(s.emergencyBlank);
        document.body.style.opacity = on ? "0" : "1";
      });

      applyUiState();
      if (state.channel) {
        connectTwitchChannel(state.channel);
      }
    </script>
  </body>
</html>
