<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Playlist Overlay</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
      }
      #player {
        width: 100vw;
        height: 100vh;
      }
      :root {
        --accent-a: #3b82f6;
        --accent-b: #22d3ee;
        --accent-glow: rgba(59, 130, 246, 0.45);
        --card-opacity: 0.75;
      }
      .clean .music-widget {
        border-radius: 10px;
        border-color: rgba(255, 255, 255, 0.12);
        box-shadow: none;
      }
      .clean .player-mask { background: linear-gradient(to top, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0)); }
      .player-mask {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0));
      }
      .notice {
        position: fixed;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 13px;
        z-index: 10;
      }
      .notice.hidden {
        display: none;
      }
      .music-widget {
        position: fixed;
        left: 24px;
        right: 24px;
        bottom: 24px;
        z-index: 15;
        color: #fff;
        background: rgba(9, 9, 11, var(--card-opacity));
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 14px;
        padding: 12px 14px;
        backdrop-filter: blur(6px);
        box-shadow: 0 0 20px var(--accent-glow);
        transition: opacity 0.35s ease, transform 0.35s ease;
      }
      .music-widget.hidden {
        opacity: 0;
        transform: translateY(16px);
      }
      .music-widget.top {
        top: 24px;
        bottom: auto;
      }
      .music-widget.minimal .meta,
      .music-widget.minimal .status-pill {
        display: none;
      }
      .music-widget.minimal .progress {
        margin-top: 8px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .track-row {
        display: grid;
        grid-template-columns: 56px 1fr;
        gap: 10px;
        align-items: center;
      }
      .cover {
        width: 56px;
        height: 56px;
        border-radius: 10px;
        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: #0f172a;
      }
      .track-title {
        margin: 0;
        font-size: 17px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
      }
      .track-title span {
        display: inline-block;
        min-width: 100%;
      }
      .track-title.marquee span {
        animation: ticker 12s linear infinite;
      }
      .meta {
        margin-top: 6px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 13px;
        color: #cbd5e1;
      }
      .status-pill {
        font-size: 12px;
        font-weight: 700;
        padding: 5px 9px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--accent-a) 22%, transparent);
        border: 1px solid color-mix(in srgb, var(--accent-a) 65%, transparent);
      }
      .status-pill.paused {
        background: rgba(245, 158, 11, 0.2);
        border-color: rgba(245, 158, 11, 0.6);
      }
      .status-pill.stopped {
        background: rgba(107, 114, 128, 0.2);
        border-color: rgba(107, 114, 128, 0.6);
      }
      .progress {
        margin-top: 10px;
        width: 100%;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(148, 163, 184, 0.35);
      }
      .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, var(--accent-a), var(--accent-b));
        transition: width 0.4s ease;
      }
      .eq {
        margin-top: 10px;
        display: flex;
        gap: 4px;
        height: 12px;
      }
      .eq span {
        flex: 1;
        border-radius: 999px;
        background: linear-gradient(180deg, var(--accent-b), var(--accent-a));
        transform-origin: bottom;
        transform: scaleY(0.2);
        opacity: 0.8;
      }
      .pulse {
        animation: pulse 3s ease-in-out infinite;
      }
      .now-playing-badge {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 16;
        max-width: 360px;
        color: #fff;
        background: rgba(8, 8, 10, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 13px;
        display: none;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        box-shadow: 0 0 16px var(--accent-glow);
      }
      .now-playing-badge.show {
        display: block;
      }
      .now-playing-badge.top {
        top: 24px;
        bottom: auto;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 6px var(--accent-glow); }
        50% { box-shadow: 0 0 14px var(--accent-glow); }
        100% { box-shadow: 0 0 6px var(--accent-glow); }
      }
      @keyframes ticker {
        0% { transform: translateX(0); }
        100% { transform: translateX(-60%); }
      }
    </style>
  </head>
  <body>
    <div class="notice">YouTube overlay active</div>
    <div id="player"></div>
    <div class="player-mask"></div>
    <div id="musicWidget" class="music-widget">
      <div class="row">
        <div class="track-row">
          <img id="trackCover" class="cover" alt="cover" />
          <p id="trackTitle" class="track-title"><span>Загрузка плейлиста...</span></p>
        </div>
        <span id="statusPill" class="status-pill">PLAYING</span>
      </div>
      <div class="meta">
        <span id="timeLabel">00:00 / 00:00</span>
        <span id="volumeLabel">VOL 40%</span>
      </div>
      <div class="progress"><div id="progressFill" class="progress-fill"></div></div>
      <div id="eq" class="eq"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    </div>
    <div id="nowPlayingBadge" class="now-playing-badge">Now Playing</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const params = new URLSearchParams(location.search);
      const initialState = {
        list: params.get("list") || "",
        volume: Math.max(0, Math.min(100, Number(params.get("volume")) || 40)),
        shuffle: params.get("shuffle") === "1",
        mode: params.get("mode") === "minimal" ? "minimal" : "full",
        position: params.get("position") === "top" ? "top" : "bottom",
        theme: params.get("theme") || "blue",
        opacity: Math.max(20, Math.min(95, Number(params.get("opacity")) || 75)),
        showMeta: params.get("showMeta") === "0" ? false : true,
        showNotice: params.get("showNotice") === "1",
        autoHideSec: Math.max(0, Math.min(30, Number(params.get("autoHideSec")) || 0)),
        compactBadge: params.get("compactBadge") === "1"
        ,visualPreset: params.get("visualPreset") === "clean" ? "clean" : "pro"
      };
      const isEmbed = params.get("embed") === "1";
      const trackTitleEl = document.getElementById("trackTitle");
      const statusPillEl = document.getElementById("statusPill");
      const timeLabelEl = document.getElementById("timeLabel");
      const volumeLabelEl = document.getElementById("volumeLabel");
      const progressFillEl = document.getElementById("progressFill");
      const trackCoverEl = document.getElementById("trackCover");
      const eqEl = document.getElementById("eq");
      const noticeEl = document.querySelector(".notice");
      const musicWidgetEl = document.getElementById("musicWidget");
      const nowPlayingBadgeEl = document.getElementById("nowPlayingBadge");

      const themeMap = {
        blue: ["#3b82f6", "#22d3ee", "rgba(59, 130, 246, 0.45)"],
        purple: ["#8b5cf6", "#ec4899", "rgba(168, 85, 247, 0.45)"],
        green: ["#22c55e", "#14b8a6", "rgba(34, 197, 94, 0.45)"],
        red: ["#ef4444", "#f59e0b", "rgba(239, 68, 68, 0.45)"]
      };
      function applyOverlayState(overlayState) {
        const selectedTheme = themeMap[overlayState.theme] || themeMap.blue;
        document.documentElement.style.setProperty("--accent-a", selectedTheme[0]);
        document.documentElement.style.setProperty("--accent-b", selectedTheme[1]);
        document.documentElement.style.setProperty("--accent-glow", selectedTheme[2]);
        document.documentElement.style.setProperty("--card-opacity", String(overlayState.opacity / 100));

        volumeLabelEl.textContent = `VOL ${overlayState.volume}%`;
        noticeEl.classList.toggle("hidden", !overlayState.showNotice);
        musicWidgetEl.classList.toggle("minimal", !overlayState.showMeta || overlayState.mode === "minimal");
        musicWidgetEl.classList.toggle("top", overlayState.position === "top");
        nowPlayingBadgeEl.classList.toggle("show", Boolean(overlayState.compactBadge));
        nowPlayingBadgeEl.classList.toggle("top", overlayState.position === "top");
        document.body.classList.toggle("clean", overlayState.visualPreset === "clean");
        eqEl.style.display = overlayState.visualPreset === "clean" ? "none" : "flex";
        if (isEmbed) {
          noticeEl.classList.add("hidden");
          nowPlayingBadgeEl.classList.remove("show");
        }
      }

      if (!initialState.list) {
        document.body.innerHTML = '<div class="notice">Нет playlist ID. Открой через playlist-control.html</div>';
      } else {
        const tag = document.createElement("script");
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);
      }
      applyOverlayState(initialState);

      let player;
      let uiTimer = null;
      let hideTimer = null;
      let currentVolume = initialState.volume;
      let activeState = { ...initialState };

      function formatTime(seconds) {
        if (!Number.isFinite(seconds) || seconds < 0) return "00:00";
        const total = Math.floor(seconds);
        const min = Math.floor(total / 60);
        const sec = total % 60;
        return `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
      }

      function setStatus(stateClass, text) {
        statusPillEl.className = `status-pill ${stateClass}`.trim();
        statusPillEl.textContent = text;
      }

      function syncWidget() {
        if (!player || typeof player.getVideoData !== "function") return;

        const data = player.getVideoData();
        const title = data && data.title ? data.title : "Без названия";
        trackTitleEl.innerHTML = `<span>${title}</span>`;
        nowPlayingBadgeEl.textContent = `Now Playing: ${title}`;
        if (data && data.video_id) {
          trackCoverEl.src = `https://i.ytimg.com/vi/${data.video_id}/mqdefault.jpg`;
        }

        // Turn on marquee only for long track titles.
        if (title.length > 55) {
          trackTitleEl.classList.add("marquee");
        } else {
          trackTitleEl.classList.remove("marquee");
        }

        const current = Number(player.getCurrentTime ? player.getCurrentTime() : 0);
        const duration = Number(player.getDuration ? player.getDuration() : 0);
        const progress = duration > 0 ? Math.min(100, Math.max(0, (current / duration) * 100)) : 0;

        progressFillEl.style.width = `${progress}%`;
        timeLabelEl.textContent = `${formatTime(current)} / ${formatTime(duration)}`;
        if (activeState.visualPreset !== "clean") {
          const bars = eqEl.querySelectorAll("span");
          bars.forEach((bar, idx) => {
            const v = 0.25 + Math.abs(Math.sin((Date.now() / 300) + idx)) * 0.75;
            bar.style.transform = `scaleY(${v})`;
          });
        }
      }

      function startUiTimer() {
        if (uiTimer) clearInterval(uiTimer);
        uiTimer = setInterval(syncWidget, 300);
      }

      function showWidgetTemporarily() {
        musicWidgetEl.classList.remove("hidden");
        if (hideTimer) clearTimeout(hideTimer);
        if (activeState.autoHideSec > 0) {
          hideTimer = setTimeout(() => {
            musicWidgetEl.classList.add("hidden");
          }, activeState.autoHideSec * 1000);
        }
      }

      function onYouTubeIframeAPIReady() {
        player = new YT.Player("player", {
          width: "100%",
          height: "100%",
          playerVars: {
            autoplay: 1,
            controls: 0,
            modestbranding: 1,
            rel: 0,
            playsinline: 1,
            iv_load_policy: 3,
            listType: "playlist",
            list: activeState.list
          },
          events: {
            onReady: onPlayerReady,
            onStateChange: onPlayerStateChange
          }
        });
      }

      function onPlayerReady(event) {
        event.target.setVolume(activeState.volume);
        currentVolume = activeState.volume;
        if (activeState.shuffle && typeof event.target.setShuffle === "function") {
          event.target.setShuffle(true);
        }
        event.target.playVideo();
        startUiTimer();
        syncWidget();
        showWidgetTemporarily();
      }

      function updateVolume(delta) {
        if (!player || typeof player.setVolume !== "function") return;
        currentVolume = Math.max(0, Math.min(100, currentVolume + delta));
        player.setVolume(currentVolume);
        volumeLabelEl.textContent = `VOL ${Math.round(currentVolume)}%`;
        showWidgetTemporarily();
      }

      function handleKeyControls(event) {
        if (!player || typeof player.getPlayerState !== "function") return;
        const key = event.key.toLowerCase();
        if (key === " ") {
          event.preventDefault();
          const state = player.getPlayerState();
          if (state === YT.PlayerState.PLAYING) {
            player.pauseVideo();
          } else {
            player.playVideo();
          }
        } else if (key === "n") {
          player.nextVideo();
        } else if (key === "p") {
          player.previousVideo();
        } else if (key === "arrowup") {
          updateVolume(5);
        } else if (key === "arrowdown") {
          updateVolume(-5);
        }
        showWidgetTemporarily();
      }
      if (!isEmbed) {
        window.addEventListener("keydown", handleKeyControls);
      }

      function applyLiveUpdate(nextState) {
        activeState = { ...activeState, ...nextState };
        applyOverlayState(activeState);
        showWidgetTemporarily();
        if (!player) return;
        if (typeof player.setVolume === "function") {
          player.setVolume(activeState.volume);
          currentVolume = activeState.volume;
          volumeLabelEl.textContent = `VOL ${Math.round(currentVolume)}%`;
        }
        if (typeof player.setShuffle === "function") {
          player.setShuffle(Boolean(activeState.shuffle));
        }
      }

      socket.on("playlist:state", (serverState) => {
        if (!serverState || !serverState.list) return;
        const listChanged = activeState.list && serverState.list !== activeState.list;
        applyLiveUpdate(serverState);
        if (listChanged && player && typeof player.loadPlaylist === "function") {
          player.loadPlaylist({
            listType: "playlist",
            list: serverState.list
          });
          player.playVideo();
        }
      });

      socket.on("playlist:command", (command) => {
        if (!player || !command || typeof command.type !== "string") return;
        if (command.type === "togglePlay") {
          const state = player.getPlayerState();
          if (state === YT.PlayerState.PLAYING) player.pauseVideo();
          else player.playVideo();
        } else if (command.type === "next") {
          player.nextVideo();
        } else if (command.type === "prev") {
          player.previousVideo();
        } else if (command.type === "volumeUp") {
          updateVolume(5);
        } else if (command.type === "volumeDown") {
          updateVolume(-5);
        } else if (command.type === "forceShow") {
          showWidgetTemporarily();
        }
      });

      function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.PLAYING) {
          setStatus("", "PLAYING");
          musicWidgetEl.classList.add("pulse");
          syncWidget();
          showWidgetTemporarily();
        } else if (event.data === YT.PlayerState.PAUSED) {
          setStatus("paused", "PAUSED");
          musicWidgetEl.classList.remove("pulse");
          syncWidget();
          showWidgetTemporarily();
        } else if (event.data === YT.PlayerState.BUFFERING) {
          setStatus("paused", "BUFFERING");
          musicWidgetEl.classList.remove("pulse");
          showWidgetTemporarily();
        } else if (event.data === YT.PlayerState.CUED) {
          setStatus("stopped", "CUED");
          musicWidgetEl.classList.remove("pulse");
        } else if (event.data === YT.PlayerState.UNSTARTED) {
          setStatus("stopped", "WAITING");
          musicWidgetEl.classList.remove("pulse");
        }

        // If video ends, YouTube playlist should continue itself.
        // This fallback nudges playback if it stops unexpectedly.
        if (event.data === YT.PlayerState.ENDED) {
          setStatus("stopped", "NEXT TRACK");
          musicWidgetEl.classList.remove("pulse");
          player.nextVideo();
          showWidgetTemporarily();
        }
      }
    </script>
  </body>
</html>
